<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">

<title>Beyblade X 賽事工具</title>
<style>
:root{--bg:#f4f2f2;--panel:#ffffff;--ink:#181416;--muted:#6f6668;--line:#ded6d8;--accent:#c91f2e;--accent2:#ef3c49;--red:#b8212d;--soft:#f6e8ea;--black:#1d191b}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Bahnschrift","Segoe UI Variable","Segoe UI","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:linear-gradient(180deg,#fff1f2,rgba(244,242,242,0) 300px),var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{border:1px solid #b71d29;border-radius:8px;min-height:38px;padding:8px 12px;background:linear-gradient(180deg,var(--accent2),var(--accent));color:#fff;cursor:pointer;font-weight:700;letter-spacing:0}button:disabled{opacity:.45;cursor:not-allowed}.ghost{background:#fff;color:var(--ink);border-color:#cfc6c8}.dark{background:linear-gradient(180deg,#2b2426,#151315);border-color:#31292b}.danger{background:linear-gradient(180deg,#2b2426,#151315);border-color:#31292b}.small{min-height:31px;padding:5px 9px;font-size:13px}input,select,textarea{width:100%;min-height:38px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;color:var(--ink)}textarea{min-height:112px;resize:vertical;line-height:1.45}input::placeholder,textarea::placeholder{color:#9b9294}.app{width:min(1220px,calc(100% - 28px));margin:auto;padding:22px 0 40px}.top{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end;margin-bottom:18px}h1{margin:0 0 6px;font-size:clamp(30px,4vw,48px);font-weight:800;line-height:1.05;letter-spacing:0;color:#161214}.sub{margin:0;color:var(--muted);font-weight:500}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.layout{display:grid;grid-template-columns:350px 1fr;gap:16px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 18px 42px rgba(28,18,20,.10)}.ph{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px 11px;border-bottom:1px solid var(--line)}.ph h2{margin:0;font-size:17px;font-weight:800}.body{padding:14px 16px 16px}.settings{display:grid;grid-template-columns:1fr 96px;gap:8px;margin-bottom:12px}.field{display:grid;gap:6px}label{font-size:13px;color:var(--muted);font-weight:600}.add{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}.roster-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.stat{background:linear-gradient(180deg,#fff7f7,#f7e9eb);border:1px solid #ead0d4;border-radius:8px;padding:10px;min-height:68px}.stat strong{display:block;font-size:25px;line-height:1;margin-bottom:6px;color:#191416;font-weight:800}.stat span{font-size:12px;color:var(--muted);font-weight:600}.players{display:grid;gap:8px;margin-top:14px;max-height:360px;overflow:auto}.player{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:#fff}.name{font-weight:800;overflow-wrap:anywhere;color:#181416}.meta{font-size:12px;color:var(--muted);margin-top:2px}.tabs{display:flex;gap:6px;padding:6px;border-bottom:1px solid var(--line);background:#f8f6f6;border-radius:8px 8px 0 0;overflow:auto}.tab{background:transparent;color:var(--muted);border-color:transparent}.tab.active{background:var(--black);color:#fff;border-color:var(--black)}.view{display:none}.view.active{display:block}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;padding:14px 16px;border-bottom:1px solid var(--line)}.roundPick{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;min-height:26px;border-radius:999px;padding:4px 8px;font-size:12px;background:#f2eeee;color:var(--muted);white-space:nowrap;border:1px solid #ded3d5;font-weight:700}.live{background:#ffe8eb;color:#bd1d2a;border-color:#efc0c6}.warn{background:#f1eeee;color:#3a3234;border-color:#d8ced0}.blue{background:#fdecef;color:#9e1e2a;border-color:#efc8cd}.matches{display:grid;gap:10px;padding:14px 16px 16px}.match{display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}.table{font-size:12px;font-weight:800;color:var(--muted)}.versus{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:10px;align-items:center}.side{min-width:0;background:#faf8f8;border:1px solid #e8dddf;border-radius:8px;padding:9px 10px}.vs{font-size:12px;font-weight:900;color:#c91f2e}.result{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:320px}.empty{padding:34px 18px;text-align:center;color:var(--muted)}table{width:100%;border-collapse:collapse}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}th{background:#faf8f8;color:var(--muted);font-size:12px;font-weight:800}.rank{display:inline-grid;place-items:center;width:34px;height:28px;border-radius:8px;background:#1f1b1d;font-weight:900;color:#fff}.toprank{background:#ffe1e5;color:#a81724;border:1px solid #efb6bd}.history{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;padding:14px 16px 16px}.card{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}.card h3{margin:0;padding:11px 12px;font-size:15px;font-weight:800;background:#faf8f8;border-bottom:1px solid var(--line)}.card ul{list-style:none;margin:0;padding:9px 12px 12px;display:grid;gap:8px;color:var(--muted);font-size:13px}.hidden{display:none}.hint{margin:8px 0 0;color:var(--muted);font-size:12px;line-height:1.4}.final-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;padding:14px 16px 16px}.final-card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:16px;min-height:112px}.final-card.champ{background:linear-gradient(180deg,#fff1f2,#fff);border-color:#efb6bd}.final-label{font-size:13px;font-weight:800;color:var(--red);margin-bottom:10px}.final-name{font-size:22px;font-weight:900;color:var(--ink);overflow-wrap:anywhere}.final-meta{margin-top:6px;font-size:12px;color:var(--muted)}@media(max-width:900px){.top,.layout{grid-template-columns:1fr}.actions{justify-content:flex-start}.match{grid-template-columns:1fr}.result{justify-content:flex-start;max-width:none}}@media(max-width:620px){.app{width:min(100% - 18px,1220px)}.settings,.add,.stats,.versus,.roster-actions{grid-template-columns:1fr}.vs{text-align:center}th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none}}

</head>
<body>
<main class="app">
<header class="top">
  <div>
    <h1>Beyblade X 賽事工具</h1>
    
  </div>
  <div class="actions">
    <button class="ghost" id="exportBtn">匯出</button>
    <button class="ghost" id="importBtn">匯入</button>
    <button class="ghost" id="replayBtn">再戰1次</button>
    <button class="danger" id="resetBtn">重設</button>
    <input id="importFile" class="hidden" type="file" accept="application/json">
  </div>
</header>
<section class="layout">
  <aside class="panel">
    <div class="ph">
      <h2>賽事設定</h2>
      <span class="pill live" id="status">尚未開始</span>
    </div>
    <div class="body">
      <div class="settings">
        <div class="field">
          <label>賽事名稱</label>
          <input id="tournamentName" value="Beyblade X 野人團" disabled>
        </div>
        <div class="field">
          <label>輪數</label>
          <input id="roundLimit" type="number" min="1" max="12">
        </div>
      </div>
      <div class="field" style="margin-bottom:12px">
        <label>賽制</label>
        <select id="formatSelect">
          <option value="swiss">瑞士制</option>
          <option value="swiss_top4">瑞士制+前4淘汰賽</option>
          <option value="single">單淘汰制</option>
        </select>
      </div>
      <div class="field" style="margin-top:12px">
        <label>批次加入名單</label>
        <textarea id="rosterBox" placeholder="一行一位選手，或用逗號分隔"></textarea>
      </div>
      <div class="roster-actions">
        <button class="ghost small" id="loadBuiltInBtn">載入內建名單</button>
        <button class="dark small" id="importRosterBtn">加入名單</button>
      </div>
      <p class="hint">單淘汰遇到人數或組合單數時只會隨機輪空；下一輪會照順序對戰。剩 3 強時改成車輪戰，若同分會繼續加賽。</p>
      <div class="stats">
        <div class="stat"><strong id="playerCount">0</strong><span>選手</span></div>
        <div class="stat"><strong id="roundCount">0</strong><span>輪次</span></div>
        <div class="stat"><strong id="doneCount">0</strong><span>已完成</span></div>
      </div>
      <div class="players" id="playerList"></div>
    </div>
  </aside>
  <section class="panel">
    <nav class="tabs">
      <button class="tab active" data-tab="matches">對戰</button>
      <button class="tab" data-tab="standings">排名</button>
      <button class="tab" data-tab="history">紀錄</button>
      <button class="tab" data-tab="results">結果</button>
    </nav>
    <section class="view active" id="matchesView">
      <div class="toolbar">
        <div class="roundPick">
          <span class="pill blue" id="roundPill">第 0 輪</span>
          <select id="roundSelect"></select>
        </div>
        <button id="pairBtn">產生下一輪配對</button>
      </div>
      <div class="matches" id="matchList"></div>
    </section>
    <section class="view" id="standingsView">
      <div class="body">
        <table>
          <thead><tr><th>排名</th><th>選手</th><th>分數</th><th>Buchholz</th><th>戰績</th><th>狀態</th></tr></thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>
    </section>
    <section class="view" id="historyView"><div class="history" id="historyList"></div></section>
    <section class="view" id="resultsView"><div class="final-grid" id="resultList"></div></section>
  </section>
</section>
</main>
<script>
var KEY='swiss-tool-v2',OLD_KEY='swiss-tool-v1',WIN=3,DRAW=1,BYE=3,FIXED_NAME='Beyblade X 野人團';
var BUILTIN=['高高','RED','小武','文哥','阿展','阿坤','泫','阿哲','ROY','小佑','wenchi','謙','元','尖頭','EN','堯'];
function blank(){return{tournament:{name:FIXED_NAME,rounds:6,format:'swiss'},players:[],matches:[],activeRound:0}}
function normalize(s){s=s||blank();s.tournament=s.tournament||{};s.tournament.name=FIXED_NAME;s.tournament.rounds=Number(s.tournament.rounds)||6;if(!s.tournament.format)s.tournament.format='swiss';s.players=Array.isArray(s.players)?s.players:[];s.matches=Array.isArray(s.matches)?s.matches:[];s.players.forEach(function(p,i){if(!p.id)p.id=id('p');if(!p.status)p.status='active';if(!p.seed)p.seed=i+1});s.matches.forEach(function(m){if(m.player1Id&&!m.p1)m.p1=m.player1Id;if(m.player2Id!==undefined&&!('p2'in m))m.p2=m.player2Id;if(!m.type)m.type=s.tournament.format});return s}
function load(){try{var raw=localStorage.getItem(KEY)||localStorage.getItem(OLD_KEY);return raw?normalize(JSON.parse(raw)):blank()}catch(e){return blank()}}
var state=load();
function qs(s){return document.querySelector(s)}
var el={tn:qs('#tournamentName'),rl:qs('#roundLimit'),fmt:qs('#formatSelect'),pn:qs('#playerName'),add:qs('#addBtn'),roster:qs('#rosterBox'),built:qs('#loadBuiltInBtn'),importRoster:qs('#importRosterBtn'),plist:qs('#playerList'),pc:qs('#playerCount'),rc:qs('#roundCount'),dc:qs('#doneCount'),status:qs('#status'),roundPill:qs('#roundPill'),roundSelect:qs('#roundSelect'),pair:qs('#pairBtn'),matches:qs('#matchList'),tbody:qs('#standingsBody'),hist:qs('#historyList'),results:qs('#resultList'),export:qs('#exportBtn'),import:qs('#importBtn'),file:qs('#importFile'),reset:qs('#resetBtn'),replay:qs('#replayBtn')};
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function id(p){return p+'_'+Math.random().toString(36).slice(2,9)}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function player(pid){return state.players.find(function(x){return x.id===pid})}
function rounds(){return Array.from(new Set(state.matches.map(function(m){return m.round}))).sort(function(a,b){return a-b})}
function rMatches(r){return state.matches.filter(function(m){return m.round===r}).sort(function(a,b){return a.table-b.table})}
function active(){return state.players.filter(function(p){return p.status==='active'})}
function done(){return state.matches.filter(function(m){return m.result!=='pending'})}
function played(a,b){return state.matches.some(function(m){return m.p2&&((m.p1===a&&m.p2===b)||(m.p1===b&&m.p2===a))})}
function hadBye(pid){return state.matches.some(function(m){return m.result==='bye'&&m.p1===pid})}
function addName(name){name=String(name||'').trim();if(!name)return false;if(state.players.some(function(x){return x.name.toLowerCase()===name.toLowerCase()}))return false;state.players.push({id:id('p'),name:name,seed:state.players.length+1,status:'active'});return true}
function standings(){var rows=state.players.map(function(x){return Object.assign({},x,{score:0,buchholz:0,wins:0,draws:0,losses:0,opps:[]})});var map=new Map(rows.map(function(x){return[x.id,x]}));done().forEach(function(m){var a=map.get(m.p1),b=map.get(m.p2);if(!a)return;if(m.result==='bye'){a.score+=BYE;a.wins++;return}if(!b)return;a.opps.push(b.id);b.opps.push(a.id);if(m.result==='draw'){a.score+=DRAW;b.score+=DRAW;a.draws++;b.draws++}if(m.result==='p1'){a.score+=WIN;a.wins++;b.losses++;if((state.tournament.format==='single'||state.tournament.format==='swiss_top4')&&m.type==='single'&&m.placement!=='third'&&m.placement!=='final3')b.status='eliminated'}if(m.result==='p2'){b.score+=WIN;b.wins++;a.losses++;if((state.tournament.format==='single'||state.tournament.format==='swiss_top4')&&m.type==='single'&&m.placement!=='third'&&m.placement!=='final3')a.status='eliminated'}});rows.forEach(function(x){x.buchholz=x.opps.reduce(function(sum,oid){var o=map.get(oid);return sum+(o?o.score:0)},0)});return rows.sort(function(a,b){return b.score-a.score||b.buchholz-a.buchholz||b.wins-a.wins||a.losses-b.losses||a.seed-b.seed||a.name.localeCompare(b.name,'zh-Hant')})}
function swissRoundCount(){var set={};state.matches.forEach(function(m){if(m.type!=='single')set[m.round]=true});return Object.keys(set).length}
function completedSwissRoundCount(){return rounds().filter(function(r){var ms=rMatches(r).filter(function(m){return m.type!=='single'});return ms.length&&ms.every(function(m){return m.result!=='pending'})}).length}
function hasSingleMatches(){return state.matches.some(function(m){return m.type==='single'})}
function isKnockoutStage(){return state.tournament.format==='single'||(state.tournament.format==='swiss_top4'&&hasSingleMatches())}
function playoffIds(){if(state.tournament.format==='single')return active().map(function(p){return p.id});var ids={};state.matches.forEach(function(m){if(m.type==='single'){ids[m.p1]=true;if(m.p2)ids[m.p2]=true}});var keys=Object.keys(ids);if(keys.length)return keys;return standings().filter(function(p){return p.status==='active'}).slice(0,4).map(function(p){return p.id})}
function currentSurvivors(){if(!isKnockoutStage())return active();var allowed={};playoffIds().forEach(function(pid){allowed[pid]=true});var eliminated={};done().forEach(function(m){if(m.type!=='single'||m.placement==='third'||m.placement==='final3')return;if(m.result==='p1'&&m.p2)eliminated[m.p2]=true;if(m.result==='p2')eliminated[m.p1]=true});return state.players.filter(function(p){return p.status==='active'&&allowed[p.id]&&!eliminated[p.id]})}
function matchWinner(m){if(!m)return null;if(m.result==='bye'||m.result==='p1')return m.p1;if(m.result==='p2')return m.p2;return null}
function matchLoser(m){if(!m||!m.p2)return null;if(m.result==='p1')return m.p2;if(m.result==='p2')return m.p1;return null}
function final3Matches(){return state.matches.filter(function(m){return m.placement==='final3'})}
function final3Started(){return final3Matches().length>0}
function final3Complete(){var ms=final3Matches();return ms.length>=3&&ms.length%3===0&&ms.every(function(m){return m.result!=='pending'})}
function needsFinal3Round(){if(!isKnockoutStage())return false;if(state.matches.some(function(m){return m.placement==='final'||m.placement==='third'}))return false;if(currentSurvivors().length!==3)return false;if(final3Started())return final3Complete()&&!final3Decided();var last=rounds().slice(-1)[0];return !last||rMatches(last).every(function(m){return m.result!=='pending'})}
function final3Rankings(){var ids=[];final3Matches().forEach(function(m){if(ids.indexOf(m.p1)<0)ids.push(m.p1);if(m.p2&&ids.indexOf(m.p2)<0)ids.push(m.p2)});var rows=ids.map(function(pid){var p=player(pid)||{};return{id:pid,wins:0,losses:0,seed:p.seed||999,name:p.name||''}});var map=new Map(rows.map(function(x){return[x.id,x]}));final3Matches().forEach(function(m){var w=matchWinner(m),l=matchLoser(m);if(w&&map.get(w))map.get(w).wins++;if(l&&map.get(l))map.get(l).losses++});return rows.sort(function(a,b){return b.wins-a.wins||a.losses-b.losses||a.seed-b.seed||a.name.localeCompare(b.name,'zh-Hant')})}
function final3Decided(){if(!final3Complete())return false;var rows=final3Rankings();return rows.length===3&&rows[0].wins!==rows[1].wins&&rows[1].wins!==rows[2].wins}
function lastCompletedRound(){var rs=rounds(),last=rs[rs.length-1];if(!last)return null;var ms=rMatches(last);return ms.length&&ms.every(function(m){return m.result!=='pending'})?{round:last,matches:ms}:null}
function needsPlacementRound(){if(!isKnockoutStage())return false;var last=lastCompletedRound();if(!last)return false;if(last.matches.some(function(m){return m.placement==='final'||m.placement==='third'}))return false;var singleMatches=last.matches.filter(function(m){return m.type==='single'&&m.placement!=='final3'});var playedMatches=singleMatches.filter(function(m){return m.p2});return currentSurvivors().length===2&&playedMatches.length>=1&&singleMatches.every(function(m){return matchWinner(m)})&&playedMatches.every(function(m){return matchLoser(m)})}
function swissTop4Ready(){var last=rounds().slice(-1)[0];return state.tournament.format==='swiss_top4'&&swissRoundCount()>=Number(state.tournament.rounds)&&last&&rMatches(last).every(function(m){return m.result!=='pending'})&&!hasSingleMatches()&&standings().filter(function(p){return p.status==='active'}).length>=4}
function tournamentComplete(){if(state.tournament.format==='swiss')return completedSwissRoundCount()>=Number(state.tournament.rounds);if(final3Decided())return true;var final=state.matches.find(function(m){return m.placement==='final'}),third=state.matches.find(function(m){return m.placement==='third'});return !!(final&&third&&final.result!=='pending'&&third.result!=='pending')}
function canPair(){var rs=rounds(),last=rs[rs.length-1];if(active().length<2)return false;if(last&&!rMatches(last).every(function(m){return m.result!=='pending'}))return false;if(state.tournament.format==='swiss')return rs.length<Number(state.tournament.rounds);if(state.tournament.format==='swiss_top4'){if(swissRoundCount()<Number(state.tournament.rounds))return true;if(swissTop4Ready())return true;if(final3Decided())return false;if(needsFinal3Round())return true;if(needsPlacementRound())return true;return hasSingleMatches()&&currentSurvivors().length>1}if(final3Decided())return false;if(needsFinal3Round())return true;if(needsPlacementRound())return true;return currentSurvivors().length>1}
function shuffleRows(rows){var a=rows.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t}return a}
function cost(a,b){var gap=Math.abs(a.score-b.score),repeat=played(a.id,b.id)?1:0;return gap*10000+repeat*1000+Math.random()}
function byeCandidate(rows){if(completedSwissRoundCount()===0)return rows[Math.floor(Math.random()*rows.length)];var available=rows.filter(function(p){return !hadBye(p.id)});if(!available.length)available=rows.slice();var minScore=Math.min.apply(null,available.map(function(p){return Number(p.score)||0}));var pool=available.filter(function(p){return (Number(p.score)||0)===minScore});return pool[Math.floor(Math.random()*pool.length)]}
function singleByeCandidate(rows){var available=rows.filter(function(p){return !hadBye(p.id)});if(!available.length)available=rows.slice();return available[Math.floor(Math.random()*available.length)]}
function randomPairs(rows){var w=shuffleRows(rows),pairs=[];while(w.length>1)pairs.push([w.shift(),w.shift()]);return pairs}
function greedyPairs(rows,avoidRepeat){var w=rows.slice().sort(function(a,b){return b.score-a.score||Math.random()-.5}),pairs=[];while(w.length>1){var a=w.shift(),bi=0,bc=Infinity;w.forEach(function(b,i){var c=avoidRepeat?cost(a,b):Math.random();if(c<bc){bc=c;bi=i}});pairs.push([a,w.splice(bi,1)[0]])}return pairs}
function pairRows(rows,avoidRepeat){return avoidRepeat?greedyPairs(rows,true):randomPairs(rows)}
function swissPairs(rows){
  if(swissRoundCount()===0)return randomPairs(rows);
  var groups={},scores=[],pairs=[],leftovers=[];
  rows.forEach(function(p){var key=String(Number(p.score)||0);if(!groups[key]){groups[key]=[];scores.push(Number(key))}groups[key].push(p)});
  scores.sort(function(a,b){return b-a});
  scores.forEach(function(score){
    var group=shuffleRows(groups[String(score)]).sort(function(a,b){return a.seed-b.seed||a.name.localeCompare(b.name,'zh-Hant')});
    if(group.length%2)leftovers.push(group.pop());
    greedyPairs(group,true).forEach(function(pair){pairs.push(pair)});
  });
  leftovers.sort(function(a,b){return b.score-a.score||a.seed-b.seed});

    leftovers.forEach(function(b,i){var c=cost(a,b);if(c<bestCost){bestCost=c;best=i}});
    pairs.push([a,leftovers.splice(best,1)[0]]);
  }

}
function addPlacementMatches(ms,round){var last=lastCompletedRound();var semis=last.matches.filter(function(m){return m.type==='single'&&m.p2}).sort(function(a,b){return a.table-b.table});var byes=last.matches.filter(function(m){return m.type==='single'&&!m.p2}).sort(function(a,b){return a.table-b.table});if(semis.length>=2){ms.push({id:id('m'),type:'single',placement:'final',round:round,table:1,p1:matchWinner(semis[0]),p2:matchWinner(semis[1]),result:'pending'});ms.push({id:id('m'),type:'single',placement:'third',round:round,table:2,p1:matchLoser(semis[0]),p2:matchLoser(semis[1]),result:'pending'});return}if(semis.length===1&&byes.length){ms.push({id:id('m'),type:'single',placement:'final',round:round,table:1,p1:matchWinner(semis[0]),p2:matchWinner(byes[0]),result:'pending'});ms.push({id:id('m'),type:'single',placement:'third',round:round,table:2,p1:matchLoser(semis[0]),p2:null,result:'bye'})}}
function addFinal3Matches(ms,round){var rows=shuffleRows(currentSurvivors());if(rows.length!==3)return;ms.push({id:id('m'),type:'single',placement:'final3',round:round,table:1,p1:rows[0].id,p2:rows[1].id,result:'pending'});ms.push({id:id('m'),type:'single',placement:'final3',round:round,table:2,p1:rows[1].id,p2:rows[2].id,result:'pending'});ms.push({id:id('m'),type:'single',placement:'final3',round:round,table:3,p1:rows[2].id,p2:rows[0].id,result:'pending'})}
function addSwissMatches(ms,round){var rows=standings().filter(function(x){return x.status==='active'}).sort(function(a,b){return b.score-a.score||b.buchholz-a.buchholz||a.seed-b.seed});if(rows.length%2){var swBye=byeCandidate(rows);rows=rows.filter(function(x){return x.id!==swBye.id});ms.push({id:id('m'),type:'swiss',round:round,table:rows.length/2+1,p1:swBye.id,p2:null,result:'bye'})}swissPairs(rows).forEach(function(pair,i){ms.push({id:id('m'),type:'swiss',round:round,table:i+1,p1:pair[0].id,p2:pair[1].id,result:'pending'})})}
function addSingleMatches(ms,round){if(needsFinal3Round()){addFinal3Matches(ms,round);return}if(needsPlacementRound()){addPlacementMatches(ms,round);return}var last=lastCompletedRound(),hasPreviousSingle=last&&last.matches.some(function(m){return m.type==='single'}),rows=[];if(hasPreviousSingle){rows=last.matches.filter(function(m){return m.type==='single'&&m.placement!=='final3'}).sort(function(a,b){return a.table-b.table}).map(function(m){return player(matchWinner(m))}).filter(Boolean)}else{rows=currentSurvivors().slice().sort(function(a,b){return a.seed-b.seed})}if(rows.length%2){var bye=singleByeCandidate(rows);rows=rows.filter(function(x){return x.id!==bye.id});ms.push({id:id('m'),type:'single',round:round,table:Math.ceil(rows.length/2)+1,p1:bye.id,p2:null,result:'bye'})}for(var i=0;i<rows.length;i+=2)ms.push({id:id('m'),type:'single',round:round,table:i/2+1,p1:rows[i].id,p2:rows[i+1].id,result:'pending'})}
function addTop4Semis(ms,round){var top=shuffleRows(standings().filter(function(x){return x.status==='active'}).slice(0,4));if(top.length<4)return;ms.push({id:id('m'),type:'single',placement:'semi',round:round,table:1,p1:top[0].id,p2:top[1].id,result:'pending'});ms.push({id:id('m'),type:'single',placement:'semi',round:round,table:2,p1:top[2].id,p2:top[3].id,result:'pending'})}
function makePairings(){if(!canPair())return;var round=rounds().length+1,ms=[];if(state.tournament.format==='single')addSingleMatches(ms,round);else if(state.tournament.format==='swiss_top4'){if(swissRoundCount()<Number(state.tournament.rounds))addSwissMatches(ms,round);else if(swissTop4Ready())addTop4Semis(ms,round);else addSingleMatches(ms,round)}else addSwissMatches(ms,round);state.matches=state.matches.concat(ms.sort(function(a,b){return a.table-b.table}));state.activeRound=round;save();render()}
