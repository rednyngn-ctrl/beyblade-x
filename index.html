<style>
:root{--bg:#f4f2f2;--panel:#ffffff;--ink:#181416;--muted:#6f6668;--line:#ded6d8;--accent:#c91f2e;--accent2:#ef3c49;--red:#b8212d;--soft:#f6e8ea;--black:#1d191b}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Bahnschrift","Segoe UI Variable","Segoe UI","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:linear-gradient(180deg,#fff1f2,rgba(244,242,242,0) 300px),var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{border:1px solid #b71d29;border-radius:8px;min-height:38px;padding:8px 12px;background:linear-gradient(180deg,var(--accent2),var(--accent));color:#fff;cursor:pointer;font-weight:700;letter-spacing:0}button:disabled{opacity:.45;cursor:not-allowed}.ghost{background:#fff;color:var(--ink);border-color:#cfc6c8}.dark{background:linear-gradient(180deg,#2b2426,#151315);border-color:#31292b}.danger{background:linear-gradient(180deg,#2b2426,#151315);border-color:#31292b}.small{min-height:31px;padding:5px 9px;font-size:13px}input,select,textarea{width:100%;min-height:38px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;color:var(--ink)}textarea{min-height:112px;resize:vertical;line-height:1.45}input::placeholder,textarea::placeholder{color:#9b9294}.app{width:min(1220px,calc(100% - 28px));margin:auto;padding:22px 0 40px}.top{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end;margin-bottom:18px}h1{margin:0 0 6px;font-size:clamp(30px,4vw,48px);font-weight:800;line-height:1.05;letter-spacing:0;color:#161214}.sub{margin:0;color:var(--muted);font-weight:500}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.layout{display:grid;grid-template-columns:350px 1fr;gap:16px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 18px 42px rgba(28,18,20,.10)}.ph{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px 11px;border-bottom:1px solid var(--line)}.ph h2{margin:0;font-size:17px;font-weight:800}.body{padding:14px 16px 16px}.settings{display:grid;grid-template-columns:1fr 96px;gap:8px;margin-bottom:12px}.field{display:grid;gap:6px}label{font-size:13px;color:var(--muted);font-weight:600}.add{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}.roster-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.stat{background:linear-gradient(180deg,#fff7f7,#f7e9eb);border:1px solid #ead0d4;border-radius:8px;padding:10px;min-height:68px}.stat strong{display:block;font-size:25px;line-height:1;margin-bottom:6px;color:#191416;font-weight:800}.stat span{font-size:12px;color:var(--muted);font-weight:600}.players{display:grid;gap:8px;margin-top:14px;max-height:360px;overflow:auto}.player{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:#fff}.name{font-weight:800;overflow-wrap:anywhere;color:#181416}.meta{font-size:12px;color:var(--muted);margin-top:2px}.tabs{display:flex;gap:6px;padding:6px;border-bottom:1px solid var(--line);background:#f8f6f6;border-radius:8px 8px 0 0;overflow:auto}.tab{background:transparent;color:var(--muted);border-color:transparent}.tab.active{background:var(--black);color:#fff;border-color:var(--black)}.view{display:none}.view.active{display:block}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;padding:14px 16px;border-bottom:1px solid var(--line)}.roundPick{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;min-height:26px;border-radius:999px;padding:4px 8px;font-size:12px;background:#f2eeee;color:var(--muted);white-space:nowrap;border:1px solid #ded3d5;font-weight:700}.live{background:#ffe8eb;color:#bd1d2a;border-color:#efc0c6}.warn{background:#f1eeee;color:#3a3234;border-color:#d8ced0}.blue{background:#fdecef;color:#9e1e2a;border-color:#efc8cd}.matches{display:grid;gap:10px;padding:14px 16px 16px}.match{display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}.table{font-size:12px;font-weight:800;color:var(--muted)}.versus{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:10px;align-items:center}.side{min-width:0;background:#faf8f8;border:1px solid #e8dddf;border-radius:8px;padding:9px 10px}.vs{font-size:12px;font-weight:900;color:#c91f2e}.result{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:320px}.empty{padding:34px 18px;text-align:center;color:var(--muted)}table{width:100%;border-collapse:collapse}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}th{background:#faf8f8;color:var(--muted);font-size:12px;font-weight:800}.rank{display:inline-grid;place-items:center;width:34px;height:28px;border-radius:8px;background:#1f1b1d;font-weight:900;color:#fff}.toprank{background:#ffe1e5;color:#a81724;border:1px solid #efb6bd}.history{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;padding:14px 16px 16px}.card{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}.card h3{margin:0;padding:11px 12px;font-size:15px;font-weight:800;background:#faf8f8;border-bottom:1px solid var(--line)}.card ul{list-style:none;margin:0;padding:9px 12px 12px;display:grid;gap:8px;color:var(--muted);font-size:13px}.hidden{display:none}.hint{margin:8px 0 0;color:var(--muted);font-size:12px;line-height:1.4}.final-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;padding:14px 16px 16px}.final-card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:16px;min-height:112px}.final-card.champ{background:linear-gradient(180deg,#fff1f2,#fff);border-color:#efb6bd}.final-label{font-size:13px;font-weight:800;color:var(--red);margin-bottom:10px}.final-name{font-size:22px;font-weight:900;color:var(--ink);overflow-wrap:anywhere}.final-meta{margin-top:6px;font-size:12px;color:var(--muted)}@media(max-width:900px){.top,.layout{grid-template-columns:1fr}.actions{justify-content:flex-start}.match{grid-template-columns:1fr}.result{justify-content:flex-start;max-width:none}}@media(max-width:620px){.app{width:min(100% - 18px,1220px)}.settings,.add,.stats,.versus,.roster-actions{grid-template-columns:1fr}.vs{text-align:center}th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none}}

<body>
<main class="app">
<header class="top"><div><h1>瑞士制賽制工具</h1><p class="sub">報名、瑞士制、單淘汰、勝負紀錄、排名</p></div><div class="actions"><button class="ghost" id="exportBtn">匯出</button><button class="ghost" id="importBtn">匯入</button><button class="danger" id="resetBtn">清空</button><input id="importFile" class="hidden" type="file" accept="application/json"></div></header>
<section class="layout"><aside class="panel"><div class="ph"><h2>賽事</h2><span class="pill live" id="status">準備中</span></div><div class="body">
<div class="settings"><div class="field"><label>名稱</label><input id="tournamentName"></div><div class="field"><label>輪數</label><input id="roundLimit" type="number" min="1" max="12"></div></div>
<div class="field" style="margin-bottom:12px"><label>賽制</label><select id="formatSelect"><option value="swiss">瑞士制</option><option value="swiss_top4">瑞士制＋前四淘汰</option><option value="single">單淘汰</option></select></div>
<div class="add"><div class="field"><label>參賽者</label><input id="playerName" placeholder="輸入姓名"></div><button id="addBtn">新增</button></div>
<div class="field" style="margin-top:12px"><label>批次名單</label><textarea id="rosterBox" placeholder="一行一位選手"></textarea></div>
<div class="roster-actions"><button class="ghost small" id="loadBuiltInBtn">載入內建名單</button><button class="dark small" id="importRosterBtn">加入名單</button></div><p class="hint">可選瑞士制、單淘汰，或瑞士制打完取前四名進淘汰賽。</p>
<div class="stats"><div class="stat"><strong id="playerCount">0</strong><span>參賽</span></div><div class="stat"><strong id="roundCount">0</strong><span>輪次</span></div><div class="stat"><strong id="doneCount">0</strong><span>完成場次</span></div></div><div class="players" id="playerList"></div></div></aside>
<section class="panel"><nav class="tabs"><button class="tab active" data-tab="matches">本輪</button><button class="tab" data-tab="standings">排名</button><button class="tab" data-tab="history">紀錄</button><button class="tab" data-tab="results">結果</button></nav><section class="view active" id="matchesView"><div class="toolbar"><div class="roundPick"><span class="pill blue" id="roundPill">第 0 輪</span><select id="roundSelect"></select></div><button id="pairBtn">產生下一輪配對</button></div><div class="matches" id="matchList"></div></section><section class="view" id="standingsView"><div class="body"><table><thead><tr><th>名次</th><th>參賽者</th><th>積分</th><th>Buchholz</th><th>勝和敗</th><th>狀態</th></tr></thead><tbody id="standingsBody"></tbody></table></div></section><section class="view" id="historyView"><div class="history" id="historyList"></div></section><section class="view" id="resultsView"><div class="final-grid" id="resultList"></div></section></section></section>
</main>
<script>
var KEY='swiss-tool-v2',OLD_KEY='swiss-tool-v1',WIN=3,DRAW=1,BYE=3;
var BUILTIN=['高高','RED','小武','文哥','阿展','阿坤','泫','阿哲','ROY','小佑','wenchi','謙','元','尖頭','EN','堯'];
function blank(){return{tournament:{name:'Beyblade X 賽事',rounds:6,format:'swiss'},players:[],matches:[],activeRound:0}}
function load(){try{var raw=localStorage.getItem(KEY)||localStorage.getItem(OLD_KEY);return raw?normalize(JSON.parse(raw)):blank()}catch(e){return blank()}}
function normalize(s){s.tournament=s.tournament||{};if(!s.tournament.name)s.tournament.name='Beyblade X 賽事';s.tournament.rounds=6;if(!s.tournament.format)s.tournament.format='swiss';s.players=Array.isArray(s.players)?s.players:[];s.matches=Array.isArray(s.matches)?s.matches:[];s.players.forEach(function(p,i){if(!p.id)p.id=id('p');if(!p.status)p.status='active';if(!p.seed)p.seed=i+1});s.matches.forEach(function(m){if(m.player1Id&&!m.p1)m.p1=m.player1Id;if(m.player2Id!==undefined&&!('p2'in m))m.p2=m.player2Id;if(!m.type)m.type=s.tournament.format});return s}
var state=load();function qs(s){return document.querySelector(s)}var el={tn:qs('#tournamentName'),rl:qs('#roundLimit'),fmt:qs('#formatSelect'),pn:qs('#playerName'),add:qs('#addBtn'),roster:qs('#rosterBox'),built:qs('#loadBuiltInBtn'),importRoster:qs('#importRosterBtn'),plist:qs('#playerList'),pc:qs('#playerCount'),rc:qs('#roundCount'),dc:qs('#doneCount'),status:qs('#status'),roundPill:qs('#roundPill'),roundSelect:qs('#roundSelect'),pair:qs('#pairBtn'),matches:qs('#matchList'),tbody:qs('#standingsBody'),hist:qs('#historyList'),results:qs('#resultList'),export:qs('#exportBtn'),import:qs('#importBtn'),file:qs('#importFile'),reset:qs('#resetBtn')};
function save(){localStorage.setItem(KEY,JSON.stringify(state))}function id(p){return p+'_'+Math.random().toString(36).slice(2,9)}function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function player(pid){return state.players.find(function(x){return x.id===pid})}function rounds(){return Array.from(new Set(state.matches.map(function(m){return m.round}))).sort(function(a,b){return a-b})}function rMatches(r){return state.matches.filter(function(m){return m.round===r}).sort(function(a,b){return a.table-b.table})}function active(){return state.players.filter(function(p){return p.status==='active'})}function done(){return state.matches.filter(function(m){return m.result!=='pending'})}function played(a,b){return state.matches.some(function(m){return m.p2&&((m.p1===a&&m.p2===b)||(m.p1===b&&m.p2===a))})}function hadBye(pid){return state.matches.some(function(m){return m.result==='bye'&&m.p1===pid})}
function addName(name){name=String(name||'').trim();if(!name)return false;if(state.players.some(function(x){return x.name.toLowerCase()===name.toLowerCase()}))return false;state.players.push({id:id('p'),name:name,seed:state.players.length+1,status:'active'});return true}
function standings(){var rows=state.players.map(function(x){return Object.assign({},x,{score:0,buchholz:0,wins:0,draws:0,losses:0,opps:[]})});var map=new Map(rows.map(function(x){return[x.id,x]}));done().forEach(function(m){var a=map.get(m.p1),b=map.get(m.p2);if(!a)return;if(m.result==='bye'){a.score+=BYE;a.wins++;return}if(!b)return;a.opps.push(b.id);b.opps.push(a.id);if(m.result==='draw'){a.score+=DRAW;b.score+=DRAW;a.draws++;b.draws++}if(m.result==='p1'){a.score+=WIN;a.wins++;b.losses++;if((state.tournament.format==='single'||state.tournament.format==='swiss_top4')&&m.type==='single'&&m.placement!=='third')b.status='eliminated'}if(m.result==='p2'){b.score+=WIN;b.wins++;a.losses++;if((state.tournament.format==='single'||state.tournament.format==='swiss_top4')&&m.type==='single'&&m.placement!=='third')a.status='eliminated'}});rows.forEach(function(x){x.buchholz=x.opps.reduce(function(sum,oid){var o=map.get(oid);return sum+(o?o.score:0)},0)});return rows.sort(function(a,b){return b.score-a.score||b.buchholz-a.buchholz||b.wins-a.wins||a.losses-b.losses||a.seed-b.seed||a.name.localeCompare(b.name,'zh-Hant')})}
function swissRoundCount(){var set={};state.matches.forEach(function(m){if(m.type!=='single')set[m.round]=true});return Object.keys(set).length}function completedSwissRoundCount(){var set={};state.matches.forEach(function(m){if(m.type!=='single'&&m.result!=='pending')set[m.round]=true});return Object.keys(set).length}
function hasSingleMatches(){return state.matches.some(function(m){return m.type==='single'})}
function isKnockoutStage(){return state.tournament.format==='single'||(state.tournament.format==='swiss_top4'&&hasSingleMatches())}
function playoffIds(){if(state.tournament.format==='single')return active().map(function(p){return p.id});var ids={};state.matches.forEach(function(m){if(m.type==='single'){ids[m.p1]=true;if(m.p2)ids[m.p2]=true}});var keys=Object.keys(ids);if(keys.length)return keys;return standings().filter(function(p){return p.status==='active'}).slice(0,4).map(function(p){return p.id})}
function currentSurvivors(){if(!isKnockoutStage())return active();var allowed={};playoffIds().forEach(function(pid){allowed[pid]=true});var eliminated={};done().forEach(function(m){if(m.type!=='single'||m.placement==='third')return;if(m.result==='p1'&&m.p2)eliminated[m.p2]=true;if(m.result==='p2')eliminated[m.p1]=true});return state.players.filter(function(p){return p.status==='active'&&allowed[p.id]&&!eliminated[p.id]})}
function matchWinner(m){if(m.result==='bye'||m.result==='p1')return m.p1;if(m.result==='p2')return m.p2;return null}
function matchLoser(m){if(!m.p2)return null;if(m.result==='p1')return m.p2;if(m.result==='p2')return m.p1;return null}
function lastCompletedRound(){var rs=rounds();var last=rs[rs.length-1];if(!last)return null;var ms=rMatches(last);return ms.length&&ms.every(function(m){return m.result!=='pending'})?{round:last,matches:ms}:null}
function needsPlacementRound(){if(!isKnockoutStage())return false;var last=lastCompletedRound();if(!last)return false;if(last.matches.some(function(m){return m.placement==='final'||m.placement==='third'}))return false;var playedMatches=last.matches.filter(function(m){return m.type==='single'&&m.p2});return playedMatches.length===2&&playedMatches.every(function(m){return matchWinner(m)&&matchLoser(m)})}
function swissTop4Ready(){var last=rounds().slice(-1)[0];return state.tournament.format==='swiss_top4'&&swissRoundCount()>=Number(state.tournament.rounds)&&last&&rMatches(last).every(function(m){return m.result!=='pending'})&&!hasSingleMatches()&&standings().filter(function(p){return p.status==='active'}).length>=4}
function canPair(){var rs=rounds();if(active().length<2)return false;var last=rs[rs.length-1];if(last&&!rMatches(last).every(function(m){return m.result!=='pending'}))return false;if(state.tournament.format==='swiss')return rs.length<Number(state.tournament.rounds);if(state.tournament.format==='swiss_top4'){if(swissRoundCount()<Number(state.tournament.rounds))return true;if(swissTop4Ready())return true;if(needsPlacementRound())return true;return hasSingleMatches()&&currentSurvivors().length>1}if(needsPlacementRound())return true;return currentSurvivors().length>1}
function shuffleRows(rows){var arr=rows.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}
function cost(a,b){var gap=Math.abs(a.score-b.score);var repeat=played(a.id,b.id)?1:0;return gap*10000+repeat*1000+Math.random()}
function byeCandidate(rows){if(completedSwissRoundCount()===0)return rows[Math.floor(Math.random()*rows.length)];var available=rows.filter(function(p){return !hadBye(p.id)});if(!available.length)available=rows.slice();var minScore=Math.min.apply(null,available.map(function(p){return Number(p.score)||0}));var pool=available.filter(function(p){return (Number(p.score)||0)===minScore});return pool[Math.floor(Math.random()*pool.length)]}
function shuffleRows(rows){var a=rows.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t}return a}
function randomPairs(rows){var w=shuffleRows(rows),pairs=[];while(w.length>1)pairs.push([w.shift(),w.shift()]);return pairs}
function greedyPairs(rows,avoidRepeat){var w=rows.slice().sort(function(a,b){return b.score-a.score||Math.random()-.5}),pairs=[];while(w.length>1){var a=w.shift(),bi=0,bc=Infinity;w.forEach(function(b,i){var c=avoidRepeat?cost(a,b):Math.random();if(c<bc){bc=c;bi=i}});pairs.push([a,w.splice(bi,1)[0]])}return pairs}
function optimalPairs(rows){var ordered=rows.slice().sort(function(a,b){return b.score-a.score||b.buchholz-a.buchholz||Math.random()-.5});if(ordered.length>28)return greedyPairs(ordered,true);var best={cost:Infinity,pairs:[]},started=Date.now();function search(waiting,pairs,total){if(Date.now()-started>1500)return;if(total>=best.cost)return;if(!waiting.length){best={cost:total,pairs:pairs};return}var a=waiting[0],rest=waiting.slice(1);var candidates=rest.map(function(b,i){return{b:b,i:i,c:cost(a,b)}}).sort(function(x,y){return x.c-y.c}).slice(0,12);candidates.forEach(function(x){search(rest.filter(function(_,i){return i!==x.i}),pairs.concat([[a,x.b]]),total+x.c)})}search(ordered,[],0);return best.pairs.length?best.pairs:greedyPairs(ordered,true)}
function pairRows(rows,avoidRepeat){if(!avoidRepeat)return randomPairs(rows);return optimalPairs(rows)}
function addPlacementMatches(ms,round){var last=lastCompletedRound();var semis=last.matches.filter(function(m){return m.type==='single'&&m.p2}).sort(function(a,b){return a.table-b.table});ms.push({id:id('m'),type:'single',placement:'final',round:round,table:1,p1:matchWinner(semis[0]),p2:matchWinner(semis[1]),result:'pending'});ms.push({id:id('m'),type:'single',placement:'third',round:round,table:2,p1:matchLoser(semis[0]),p2:matchLoser(semis[1]),result:'pending'})}
function addSwissMatches(ms,round){var rows=standings().filter(function(x){return x.status==='active'}).sort(function(a,b){return b.score-a.score||b.buchholz-a.buchholz||a.seed-b.seed});if(rows.length%2){var swBye=byeCandidate(rows);rows=rows.filter(function(x){return x.id!==swBye.id});ms.push({id:id('m'),type:'swiss',round:round,table:rows.length/2+1,p1:swBye.id,p2:null,result:'bye'})}pairRows(rows,swissRoundCount()>0).forEach(function(pair,i){ms.push({id:id('m'),type:'swiss',round:round,table:i+1,p1:pair[0].id,p2:pair[1].id,result:'pending'})})}
function addSingleMatches(ms,round){if(needsPlacementRound()){addPlacementMatches(ms,round);return}var last=lastCompletedRound(),hasPreviousSingle=last&&last.matches.some(function(m){return m.type==='single'}),rows=[];if(hasPreviousSingle){rows=last.matches.filter(function(m){return m.type==='single'}).sort(function(a,b){return a.table-b.table}).map(function(m){return player(matchWinner(m))}).filter(Boolean)}else{rows=shuffleRows(currentSurvivors())}if(rows.length%2){var bye=rows.pop();ms.push({id:id('m'),type:'single',round:round,table:Math.ceil(rows.length/2)+1,p1:bye.id,p2:null,result:'bye'})}if(hasPreviousSingle){for(var i=0;i<rows.length;i+=2)ms.push({id:id('m'),type:'single',round:round,table:i/2+1,p1:rows[i].id,p2:rows[i+1].id,result:'pending'})}else{pairRows(rows,false).forEach(function(pair,i){ms.push({id:id('m'),type:'single',round:round,table:i+1,p1:pair[0].id,p2:pair[1].id,result:'pending'})})}}
function addTop4Semis(ms,round){var top=shuffleRows(standings().filter(function(x){return x.status==='active'}).slice(0,4));if(top.length<4)return;ms.push({id:id('m'),type:'single',placement:'semi',round:round,table:1,p1:top[0].id,p2:top[1].id,result:'pending'});ms.push({id:id('m'),type:'single',placement:'semi',round:round,table:2,p1:top[2].id,p2:top[3].id,result:'pending'})}
function makePairings(){if(!canPair())return;var round=rounds().length+1;var ms=[];if(state.tournament.format==='single')addSingleMatches(ms,round);else if(state.tournament.format==='swiss_top4'){if(swissRoundCount()<Number(state.tournament.rounds))addSwissMatches(ms,round);else if(swissTop4Ready())addTop4Semis(ms,round);else addSingleMatches(ms,round)}else addSwissMatches(ms,round);state.matches=state.matches.concat(ms.sort(function(a,b){return a.table-b.table}));state.activeRound=round;save();render()}
function addPlayer(){if(addName(el.pn.value)){el.pn.value='';save();render()}else el.pn.select()}function addRosterText(){el.roster.value.split(/\r?\n|,/).forEach(addName);el.roster.value='';save();render()}function loadBuiltIn(){el.roster.value=BUILTIN.join('\n')}function toggle(pid){var x=player(pid);if(!x)return;x.status=x.status==='active'?'dropped':'active';save();render()}function setResult(mid,res){var m=state.matches.find(function(x){return x.id===mid});if(!m||m.result==='bye')return;m.result=res;save();render()}function resText(m){var a=player(m.p1),b=player(m.p2);if(m.result==='pending')return'未回報';if(m.result==='bye')return(a?a.name:'')+' 輪空';if(m.result==='draw')return'平手';if(m.result==='p1')return(a?a.name:'')+' 勝';if(m.result==='p2')return(b?b.name:'')+' 勝';return''}function matchLabel(m){if(m.placement==='final')return'冠亞';if(m.placement==='third')return'季殿';return'桌次 '+m.table}function side(x,s){return '<div class="side"><div class="name">'+esc(x?x.name:'-')+'</div><div class="meta">'+(s?s.score:0)+' 分</div></div>'}
function render(){el.tn.value=state.tournament.name;el.rl.value=state.tournament.rounds;el.fmt.value=state.tournament.format;el.rl.disabled=state.tournament.format==='single';var rs=rounds(),last=rs[rs.length-1]||0;if(!state.activeRound||rs.indexOf(state.activeRound)<0)state.activeRound=last;el.pc.textContent=active().length;el.rc.textContent=rs.length;el.dc.textContent=done().length;var survivors=currentSurvivors().length;el.status.textContent=rs.length?'進行中':'準備中';if((state.tournament.format==='single'||state.tournament.format==='swiss_top4')&&rs.length&&hasSingleMatches()&&survivors===1)el.status.textContent='冠軍產生';else if(state.tournament.format==='swiss_top4'&&swissTop4Ready())el.status.textContent='前四待賽';if(state.tournament.format==='swiss'&&rs.length>=Number(state.tournament.rounds)&&last&&rMatches(last).every(function(m){return m.result!=='pending'}))el.status.textContent='已完成';el.pair.textContent=state.tournament.format==='single'?'產生下一輪單淘汰':(state.tournament.format==='swiss_top4'?(swissRoundCount()<Number(state.tournament.rounds)?'產生下一輪瑞士配對':'產生前四淘汰賽'):'產生下一輪配對');el.pair.disabled=!canPair();el.roundPill.textContent='第 '+(state.activeRound||0)+' 輪';renderPlayers();renderRoundSelect(rs);renderMatches();renderStandings();renderHistory(rs);renderResults(rs)}
function renderPlayers(){var rows=standings();el.plist.innerHTML=rows.length?rows.map(function(x){var stateText=x.status==='active'?'參賽':(x.status==='eliminated'?'淘汰':'退賽');return '<div class="player"><div><div class="name">'+esc(x.name)+'</div><div class="meta">'+x.score+' 分 · '+stateText+'</div></div><button class="ghost small" data-player="'+x.id+'">'+(x.status==='active'?'退賽':'復賽')+'</button></div>'}).join(''):'<div class="empty">尚無參賽者</div>';el.plist.querySelectorAll('[data-player]').forEach(function(b){b.onclick=function(){toggle(b.dataset.player)}})}
function renderRoundSelect(rs){el.roundSelect.innerHTML=rs.length?rs.map(function(r){return '<option value="'+r+'">第 '+r+' 輪</option>'}).join(''):'<option value="0">尚無輪次</option>';el.roundSelect.value=String(state.activeRound||0);el.roundSelect.disabled=!rs.length}
function renderMatches(){var ms=rMatches(state.activeRound),rank=new Map(standings().map(function(x){return[x.id,x]}));if(!ms.length){el.matches.innerHTML='<div class="empty">尚未產生配對</div>';return}el.matches.innerHTML=ms.map(function(m){var a=player(m.p1),b=player(m.p2),allowDraw=false;return '<article class="match"><div class="table">'+matchLabel(m)+'</div><div class="versus">'+side(a,rank.get(m.p1))+'<div class="vs">'+(b?'VS':'BYE')+'</div>'+(b?side(b,rank.get(m.p2)):'<div class="side"><div class="name">輪空</div><div class="meta">自動晉級</div></div>')+'</div><div class="result"><span class="pill '+(m.result==='pending'?'warn':'live')+'">'+esc(resText(m))+'</span>'+(b?'<button class="ghost small" data-result="'+m.id+':p1">'+esc(a.name)+' 勝</button>'+'<button class="ghost small" data-result="'+m.id+':p2">'+esc(b.name)+' 勝</button>':'')+'</div></article>'}).join('');el.matches.querySelectorAll('[data-result]').forEach(function(b){b.onclick=function(){var parts=b.dataset.result.split(':');setResult(parts[0],parts[1])}})}
function renderStandings(){var rows=standings();el.tbody.innerHTML=rows.length?rows.map(function(x,i){var stateText=x.status==='active'?'參賽':(x.status==='eliminated'?'淘汰':'退賽');return '<tr><td><span class="rank '+(i<3?'toprank':'')+'">'+(i+1)+'</span></td><td><strong>'+esc(x.name)+'</strong></td><td>'+x.score+'</td><td>'+x.buchholz+'</td><td>'+x.wins+'-'+x.draws+'-'+x.losses+'</td><td><span class="pill '+(x.status==='active'?'live':'warn')+'">'+stateText+'</span></td></tr>'}).join(''):'<tr><td colspan="6" class="empty">尚無排名</td></tr>'}
function renderHistory(rs){el.hist.innerHTML=rs.length?rs.map(function(r){return '<article class="card"><h3>第 '+r+' 輪</h3><ul>'+rMatches(r).map(function(m){var a=player(m.p1),b=player(m.p2),names=b?esc(a.name)+' vs '+esc(b.name):esc(a.name)+' 輪空';return '<li><strong>'+matchLabel(m)+'</strong> · '+names+' · '+esc(resText(m))+'</li>'}).join('')+'</ul></article>'}).join(''):'<div class="empty">尚無紀錄</div>'}
function finalCard(label,pid,extra,champ){var p=player(pid);return '<article class="final-card '+(champ?'champ':'')+'"><div class="final-label">'+label+'</div><div class="final-name">'+esc(p?p.name:'尚未產生')+'</div><div class="final-meta">'+esc(extra||'')+'</div></article>'}
function renderResults(rs){if(!el.results)return;var hasPlayoffResult=state.tournament.format==='single'||state.tournament.format==='swiss_top4';if(hasPlayoffResult){var final=state.matches.find(function(m){return m.placement==='final'}),third=state.matches.find(function(m){return m.placement==='third'});if(!final||!third||final.result==='pending'||third.result==='pending'){var msg=state.tournament.format==='swiss_top4'?'瑞士制完成後取前四打完冠亞與季殿戰，這裡會顯示最後結果':'單淘汰完成冠亞與季殿戰後，這裡會顯示最後結果';el.results.innerHTML='<div class="empty">'+msg+'</div>';return}var champ=matchWinner(final),runner=matchLoser(final),thirdPlace=matchWinner(third),fourth=matchLoser(third);el.results.innerHTML=finalCard('冠軍',champ,'冠亞戰勝者',true)+finalCard('亞軍',runner,'冠亞戰敗者',false)+finalCard('季軍',thirdPlace,'季殿戰勝者',false)+finalCard('殿軍',fourth,'季殿戰敗者',false);return}var last=rs[rs.length-1];var finished=last&&rs.length>=Number(state.tournament.rounds)&&rMatches(last).every(function(m){return m.result!=='pending'});if(!finished){el.results.innerHTML='<div class="empty">瑞士制完成所有輪次後，這裡會顯示最後排名</div>';return}var rows=standings().slice(0,4);var labels=['冠軍','亞軍','季軍','殿軍'];el.results.innerHTML=rows.map(function(row,i){return finalCard(labels[i],row.id,row.score+' 分 · Buchholz '+row.buchholz,i===0)}).join('')}
function exportData(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=(state.tournament.name||'tournament')+'.json';a.click();URL.revokeObjectURL(url)}function importData(file){if(!file)return;var reader=new FileReader();reader.onload=function(){try{var next=normalize(JSON.parse(String(reader.result)));state=next;save();render()}catch(e){alert('匯入失敗')}};reader.readAsText(file);el.file.value=''}
document.querySelectorAll('.tab').forEach(function(b){b.onclick=function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});document.querySelectorAll('.view').forEach(function(x){x.classList.remove('active')});b.classList.add('active');qs('#'+b.dataset.tab+'View').classList.add('active')}});el.add.onclick=addPlayer;el.pn.onkeydown=function(e){if(e.key==='Enter')addPlayer()};el.built.onclick=loadBuiltIn;el.importRoster.onclick=addRosterText;el.tn.onchange=function(){state.tournament.name=el.tn.value.trim()||'未命名賽事';save();render()};el.rl.onchange=function(){state.tournament.rounds=Math.max(1,Math.min(12,Number(el.rl.value)||6));save();render()};el.fmt.onchange=function(){if(state.matches.length&&!confirm('切換賽制會清除目前輪次與成績，確定切換？')){el.fmt.value=state.tournament.format;return}state.tournament.format=el.fmt.value;state.matches=[];state.activeRound=0;state.players.forEach(function(p){if(p.status==='eliminated')p.status='active'});save();render()};el.pair.onclick=makePairings;el.roundSelect.onchange=function(){state.activeRound=Number(el.roundSelect.value);save();render()};el.export.onclick=exportData;el.import.onclick=function(){el.file.click()};el.file.onchange=function(e){importData(e.target.files[0])};el.reset.onclick=function(){if(confirm('確定清空目前賽事？')){state=blank();save();render()}};render();
</script>
